<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request a Demo — Operion Systems</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.svg">
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <a href="index.html" class="nav-logo">
    <img src="logo.svg" alt="">
    OPERION <span class="nav-logo-sys">SYSTEMS</span>
  </a>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="how-it-works.html">How It Works</a>
    <a href="pricing.html">Pricing</a>
    <a href="about.html">About</a>
    <a href="demo.html">Demo</a>
  </div>

  <div class="nav-cta">
    <a href="dashboard.html" class="btn btn-ghost btn-sm">Client Login</a>
    <a href="get-started.html" class="btn btn-primary btn-sm">Get Started</a>
  </div>
</nav>

<!-- HERO -->
<section class="section">
  <div class="container center">
    <h1>See Operion handle your enquiries live</h1>
    <p class="subtext">
      Submit the form and watch Operion respond in real time.
    </p>
  </div>
</section>

<!-- MAIN -->
<section class="section">
  <div class="container" style="max-width: 720px;">

    <div class="card">

      <h2>Request Your Demo</h2>
      <p class="subtext">No sales pitch. Just a real system response.</p>

      <!-- RESPONSE OUTPUT -->
      <div id="demo-response"></div>

      <!-- FORM -->
      <form id="demo-form" novalidate>

        <div class="form-group">
          <label class="form-label">Name *</label>
          <input type="text" name="name" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label">Email *</label>
          <input type="email" name="email" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="tel" name="phone" class="form-input">
        </div>

        <div class="form-group">
          <label class="form-label">Company</label>
          <input type="text" name="company" class="form-input">
        </div>

        <div class="form-group">
          <label class="form-label">Business Type</label>
          <input type="text" name="business_type" class="form-input">
        </div>

        <div class="form-group">
          <label class="form-label">Message</label>
          <textarea name="message" class="form-textarea"></textarea>
        </div>

        <button id="demo-submit" class="btn btn-primary" style="width:100%;">
          Request Demo →
        </button>

      </form>

    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <p>© Operion Systems</p>
  </div>
</footer>

<!-- SCRIPT -->
<script>
(function () {

  const WEBHOOK_URL = "http://localhost:5678/webhook/demo"; 
  // ⚠️ Change if your n8n endpoint differs

  function setState(type, message) {
    const el = document.getElementById('demo-response');

    if (!el) return;

    el.innerHTML = `
      <div class="form-${type}">
        ${message}
      </div>
    `;
  }

  async function handleSubmit(e) {
    e.preventDefault();

    const form = document.getElementById('demo-form');
    const btn = document.getElementById('demo-submit');

    if (!form) return;

    btn.disabled = true;
    btn.textContent = "Processing…";

    setState("info", "Submitting request…");

    const data = Object.fromEntries(new FormData(form).entries());

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      if (!res.ok) throw new Error(res.status);

      let json;
      try {
        json = await res.json();
      } catch {
        json = {};
      }

      const message =
        json.message ||
        "Request received. We will contact you shortly.";

      setState("success", message);

      form.reset();

    } catch (err) {
      console.error(err);
      setState("error", "Failed to submit. Please try again.");
    }

    btn.disabled = false;
    btn.textContent = "Request Demo →";
  }

  function init() {
    const form = document.getElementById('demo-form');
    if (!form) return;

    form.addEventListener('submit', handleSubmit);
  }

  document.addEventListener("DOMContentLoaded", init);

})();
</script>

</body>
</html>
